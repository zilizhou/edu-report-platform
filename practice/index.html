<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实操内容 · AI 赋能个性化教学</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      background: #0d0f1a;
      color: #e8eaf6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: rgba(13,15,26,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      z-index: 50;
    }

    nav a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    nav a:hover { color: #e8eaf6; }

    .nav-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e8eaf6;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-badge {
      padding: 2px 10px;
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 100px;
      font-size: 0.68rem;
      color: #34d399;
      letter-spacing: 1px;
    }

    .open-btn {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .open-btn:hover {
      border-color: rgba(52,211,153,0.4);
      color: #34d399;
    }

    .iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* fallback when iframe blocked */
    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #0d0f1a;
      text-align: center;
      padding: 40px;
    }
    .fallback.show { display: flex; }

    .fallback-icon { font-size: 3rem; }
    .fallback h2 { font-size: 1.2rem; color: rgba(255,255,255,0.8); }
    .fallback p { font-size: 0.88rem; color: rgba(255,255,255,0.4); line-height: 1.7; max-width: 420px; }
    .fallback a.go-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 28px;
      background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(99,102,241,0.15));
      border: 1px solid rgba(52,211,153,0.35);
      border-radius: 100px;
      color: #6ee7b7;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.25s;
    }
    .fallback a.go-btn:hover {
      background: linear-gradient(135deg, rgba(52,211,153,0.25), rgba(99,102,241,0.25));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(52,211,153,0.15);
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">← 返回首页</a>
    <div class="nav-title">
      实操内容
      <span class="nav-badge">PRACTICE</span>
    </div>
    <a class="open-btn" href="https://docs.z-xin.net/teachbook/kgandnlp/AI%E8%B5%8B%E8%83%BD%E4%B8%AA%E6%80%A7%E5%8C%96%E6%95%99%E5%AD%A6.html" target="_blank">
      在新标签页打开 ↗
    </a>
  </nav>

  <div class="iframe-wrap">
    <iframe
      id="contentFrame"
      src="https://docs.z-xin.net/teachbook/kgandnlp/AI%E8%B5%8B%E8%83%BD%E4%B8%AA%E6%80%A7%E5%8C%96%E6%95%99%E5%AD%A6.html"
      title="AI 赋能个性化教学实操指南"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
    ></iframe>

    <div class="fallback" id="fallback">
      <div class="fallback-icon">📖</div>
      <h2>实操内容</h2>
      <p>
        AI 赋能个性化教学操作指南<br>
        使用 Workbuddy 平台，通过知识图谱提取、AI 模型配置，<br>
        实现从课程资料到个性化教学的完整工作流。
      </p>
      <a class="go-btn"
         href="https://docs.z-xin.net/teachbook/kgandnlp/AI%E8%B5%8B%E8%83%BD%E4%B8%AA%E6%80%A7%E5%8C%96%E6%95%99%E5%AD%A6.html"
         target="_blank">
        打开实操指南 →
      </a>
    </div>
  </div>

  <script>
    // If iframe fails to load (X-Frame-Options / CSP blocked), show fallback
    const frame = document.getElementById('contentFrame');
    const fallback = document.getElementById('fallback');

    let loaded = false;
    frame.addEventListener('load', () => { loaded = true; });

    setTimeout(() => {
      if (!loaded) {
        frame.style.display = 'none';
        fallback.classList.add('show');
      }
    }, 5000);

    frame.addEventListener('error', () => {
      frame.style.display = 'none';
      fallback.classList.add('show');
    });
  </script>
</body>
</html>
