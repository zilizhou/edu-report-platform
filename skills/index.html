# AI 私人助教技能

## 概述

本技能让大模型成为大学生的 **AI 私人助教**。学生将自己的知识画像输入后，助教即可：

- 精准了解该学生哪里会、哪里不会
- 以学生当前知识状态为起点展开对话
- **跨对话持续记录学习进展，随对话动态更新画像**
- 根据学生需要灵活切换辅导模式

> **面向学生的使用说明**：第一次使用时，把老师发给你的「知识画像」粘贴到对话框，然后告诉助教你想做什么。

---

## 四种辅导模式

### 模式一：自由问答
学生直接提问，助教根据知识画像中的掌握等级调整解释深度：
- `good/excellent` → 提供进阶解释，聚焦边缘情况
- `weak/poor` → 从基础开始，使用类比和例子，分步骤讲解

### 模式二：出题测验
- 优先针对 `weak/poor` 知识点出题
- **一次只出一道题**，等学生回答后再继续
- 答对 → 肯定 + 追问；答错 → 先问思路 → 讲解正确方法

### 模式三：学习计划
收集考试日期与每日可用时间，生成个性化分阶段复习计划：
- 🔴 第一阶段：补根基（前置依赖薄弱的知识点）
- 🟡 第二阶段：攻弱点（主要 weak/poor 知识点）
- 🟢 第三阶段：综合提升

### 模式四：导师对话
苏格拉底式启发对话，像大学导师一样讨论问题，聚焦理解而非记忆。

---

## 快捷指令

| 指令 | 效果 |
|------|------|
| `#出题` | 针对最薄弱知识点出一道题 |
| `#计划 [天数]` | 生成 X 天复习计划 |
| `#今天` | 显示今日学习任务 |
| `#画像` | 显示当前知识画像摘要 |
| `#历史` | 显示最近 3 次对话学习摘要 |

---

## 动态更新知识画像

助教在对话中持续观察学生表现并更新画像：

| 触发条件 | 等级变化 |
|---------|---------|
| 同一知识点连续 3 题答对且解释清晰 | 提升一级（如 weak → fair） |
| 同一知识点连续 3 题答错 | 维持或降一级 |
| 自由问答中展示深度理解 | 提升一级 |
| 发现画像未标注的新薄弱点 | 新增知识点，标为 weak |

---

## 数据持久化

助教使用键值存储跨对话记忆学生状态：

- `tutor:profile` — 学生知识画像（含动态更新后的掌握等级）
- `tutor:plan` — 当前学习计划
- `tutor:session_log` — 历史学习记录
- `tutor:quiz_stats` — 测验统计

> 若平台支持持久化存储，学生无需每次重新输入画像；若不支持，每次对话开始时重新粘贴画像即可。

# 课程知识图谱构建技能

## 概述

本技能将教学资源（教学大纲、教案、教学PPT、电子书籍等）转化为结构化的课程知识图谱。核心产出是一份以**三元组**（主体, 关系, 客体）形式存储的 CSV 文件，可直接导入 Neo4j、Gephi 等图数据库或可视化工具。

---

## 工作流程

### 第一步：读取教学资源
支持 `.pdf`、`.pptx`、`.docx`、`.xlsx`、纯文本/Markdown 等格式。

### 第二步：知识点抽取
从资源内容中识别并抽取：**概念** · **方法/技术** · **模型/框架** · **属性/特征** · **过程/流程** · **人物/历史**

### 第三步：关系类型定义

| 关系类型 | 标签 | 说明 |
|---------|------|------|
| 是一种 | `IS_A` | 上下位/分类关系 |
| 包含 | `CONTAINS` | 整体-部分关系 |
| 前置知识 | `PREREQUISITE_OF` | 学习依赖关系 |
| 用于 | `USED_FOR` | 应用关系 |
| 相关于 | `RELATED_TO` | 横向关联 |
| 对比于 | `CONTRASTS_WITH` | 对立/对比 |
| 导致 | `LEADS_TO` | 因果关系 |
| 属于章节 | `BELONGS_TO` | 知识点归属模块 |

### 第四步：构建三元组
```
(主体知识点, 关系类型, 客体知识点)
```

### 第五步：生成 CSV 文件

**主文件：`knowledge_graph_triples.csv`**
```
subject, relation, object, subject_type, object_type, source, confidence
```

**辅助文件：`knowledge_nodes.csv`**
```
node_id, name, type, chapter, definition, difficulty
```

---

## 输出规范

1. `knowledge_graph_triples.csv` — 核心三元组文件（必须）
2. `knowledge_nodes.csv` — 知识点节点详情（推荐）
3. 图谱统计摘要：知识点数量、三元组数量、关系类型分布、章节覆盖列表
</script>

# 作业与试卷题目知识点标注技能

## 概述

本技能面向作业、试卷、练习册等题目集合类文档，通过逐题理解与分析，为每道题目标注一个或多个对应知识点，输出结构化 CSV 文件。

**应用场景**：题库建设 · 考点统计 · 学情分析 · 知识薄弱点诊断 · 自适应学习系统

---

## 工作流程

### 第一步：读取题目文档
支持 PDF、DOCX、PPTX、XLSX/CSV、纯文本/Markdown。

### 第二步：题目解析与结构化

**题型分类标签**：

| 标签 | 说明 |
|------|------|
| `single_choice` | 单项选择题 |
| `true_false` | 判断题 |
| `fill_blank` | 填空题 |
| `short_answer` | 简答题 |
| `calculation` | 计算题 |
| `coding` | 编程题 |

### 第三步：知识点标注

**标注思路（依次分析）**：
1. 题目考查的核心操作是什么？（记忆/理解/应用/分析）
2. 涉及哪些核心概念或术语？
3. 解题需要哪些前置知识？

**知识点优先级**：
- `primary`：题目最直接考查的知识点（必填，至少1个）
- `secondary`：辅助性、背景性知识点（选填）

### 第四步：难度与认知层次（可选）

**布鲁姆认知层次**：`remember` · `understand` · `apply` · `analyze` · `evaluate` · `create`

---

## 输出文件

**主文件：`question_knowledge_tags.csv`**
```
question_id, question_type, question_stem, knowledge_points,
primary_kp, secondary_kp, difficulty, cognitive_level, score
```

**辅助：`knowledge_point_statistics.csv`**
```
knowledge_point, question_count, question_ids, total_score, difficulty_distribution
```

# 学生知识画像构建技能

## 概述

本技能综合题目知识点标注与学生成绩数据，为每位学生构建**知识点维度的学习画像**，量化各知识点的掌握程度，识别优势与薄弱点。

**核心设计原则**：在任意精度的成绩数据下，都要体现学生个体差异。对于粗粒度成绩，通过难度感知调整与认知层次修正使同分学生产生有据差异。

---

## 三种成绩单格式

### 类型 A：仅含总分
通过难度感知调整 + 认知层次修正推断各知识点掌握度，置信区间 ≤ ±0.20，数据质量：`medium-low`

### 类型 B：含大题分 + 总分
精确到题组，大题内部二次分层，置信区间 ≤ ±0.10，数据质量：`medium-high`

### 类型 C：含小题分 + 总分
精确到每道题，含答题一致性检验，数据质量：`high`

---

## 掌握等级映射

| 得分率 | 等级 | 标签 | 含义 |
|-------|------|------|------|
| ≥ 90% | 优秀 | `excellent` | 完全掌握，可迁移应用 |
| 75%～89% | 良好 | `good` | 基本掌握，偶有失误 |
| 60%～74% | 一般 | `fair` | 部分掌握，存在漏洞 |
| 40%～59% | 薄弱 | `weak` | 掌握不足，需重点练习 |
| < 40% | 欠缺 | `poor` | 严重欠缺，需系统补习 |

---

## 知识点风险指数

```
风险指数 = (1 - score_rate) × (1 + 置信区间宽度)
```

| 风险等级 | 阈值 | 建议 |
|---------|------|------|
| `high_risk` | > 0.60 | 优先干预 |
| `medium_risk` | 0.30～0.60 | 需关注 |
| `low_risk` | < 0.30 | 暂无需干预 |

---

## 输出文件

1. `student_knowledge_profile.csv` — 学生×知识点掌握度明细（每行一条学生-知识点记录）
2. `student_summary_profile.csv` — 学生综合画像摘要（每行一位学生）
3. `class_knowledge_heatmap.csv` — 班级知识点热力图数据（含预警等级）

# 个性化作业布置技能

## 概述

本技能综合**学生知识画像**与**课程知识图谱**，考虑知识点间的关联与依赖关系，为每位学生自动生成一份满分 100 分的个性化作业方案。

**有题库**时从中智能选题；**无题库**时根据学生薄弱点现场生成题目。

---

## 核心设计原则

### 原则一：知识关联分析优先

学生某知识点薄弱，根因不一定在该知识点本身。布置作业前必须：

1. 查找薄弱知识点在知识图谱中的**前置依赖节点**
2. 检查学生在这些前置节点上的掌握度
3. 若前置节点也薄弱，**优先补充前置知识点练习**

```
学生 A：分数除法（poor）← 检查 → 分数乘法（fair）← 检查 → 分数的意义（good）
根因定位：分数乘法是瓶颈，作业应先补分数乘法，再练分数除法
```

### 原则二：区分巩固与补漏

| 掌握等级 | 作业策略 |
|---------|---------|
| excellent / good | 不布置（避免重复刷题） |
| fair | 少量巩固题，提升稳定性 |
| weak | 适量强化题 + 追溯前置知识点 |
| poor | 较多补基础题 + 前置补习题，难度递进 |

### 原则三：满分 100 分弹性分配

薄弱/欠缺知识点获得更多分值，优良知识点不分配分值，确保作业聚焦在真正需要练习的地方。

---

## 分值权重基准

| 知识点等级 | 基础分值 |
|-----------|---------|
| poor（欠缺）| 20 分/点 |
| weak（薄弱）| 15 分/点 |
| 前置根因节点 | 额外 +5～10 分 |
| fair（一般，巩固）| 8 分/点 |

---

## 输出文件

1. 每位学生的个性化作业单（含题目、答案、解析）
2. `homework_summary.csv` — 班级作业汇总表
3. `homework_kp_coverage.csv` — 知识点覆盖分析表
</script>

# 大学生个性化学习资源推荐技能

## 概述

本技能综合**学生知识画像**与**课程知识图谱**，为每位大学生推荐个性化学习资源清单，涵盖本地资源与网络资源，支持多模态形式。

**资源来源**：本地课件/教材 + 网络公开课/论文/工具
**面向对象**：高校大学生，强调学术深度与自主探索能力

---

## 掌握等级驱动资源深度

| 等级 | 学习需求 | 资源策略 |
|------|---------|---------|
| poor | 重建认知框架 | 系统性入门课程、直观动画讲解、基础教材章节 |
| weak | 填补理解漏洞 | 专题讲解视频、有例题的笔记/博客、配套练习平台 |
| fair | 强化与应用 | 进阶课程片段、经典习题集、案例分析文章 |
| good | 拓展与融会贯通 | 学术综述、开源项目实践、跨知识点综合资源 |
| excellent | 前沿探索 | 顶会论文、前沿工具/框架、研究级项目、学术讲座 |

> **大学生特别注意**：即使是 poor 等级，推荐资源也应保持大学本科/研究生的学术调性。

---

## 多模态资源形式

| 资源形式 | 适用场景 | 典型来源 |
|---------|---------|---------|
| 🎬 视频课程 | 系统建立知识框架 | Bilibili、中国大学MOOC、MIT OCW、Coursera |
| 📄 文章/博客 | 深度理解某一细节 | 知乎、CSDN、Medium、官方文档 |
| 📊 学术论文 | 理解原理，前沿探索 | arXiv、知网、Google Scholar |
| 🛠️ 交互平台 | 边学边练，即时反馈 | LeetCode、Kaggle、Brilliant.org |
| 💻 代码/项目 | 实践应用，工程能力 | GitHub、Papers with Code |
| 📊 可视化工具 | 理解抽象概念 | VisuAlgo、3Blue1Brown、Desmos |

---

## 知识关联分析优先

薄弱知识点的根因可能是前置知识点不牢。推荐资源前须追溯前置依赖节点，优先推荐根因节点资源（标注"建议先学"）。

---

## 输出文件

1. 每位学生的个性化资源推荐单（`.md` 格式，含获取方式与学习路径建议）
2. `resource_recommendation_summary.csv` — 班级推荐汇总
3. `resource_pool.csv` — 全班资源池（便于教师审核复用）
</script>
